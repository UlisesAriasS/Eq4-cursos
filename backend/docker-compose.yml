# docker-compose.yml — Eq4-Cursos Backend

services:
  # ── Base de datos MySQL 8 ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: eq4_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eq4cursos
      MYSQL_USER: eq4user
      MYSQL_PASSWORD: eq4password
    ports:
      - "3307:3306"          # Puerto 3307 en host para no chocar con MySQL local
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Carga el esquema automáticamente
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "eq4user", "-peq4password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eq4_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db               # Nombre del servicio Docker, no localhost
      DB_PORT: 3306
      DB_USER: eq4user
      DB_PASSWORD: eq4password
      DB_NAME: eq4cursos
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173"
    depends_on:
      db:
        condition: service_healthy   # Espera a que MySQL esté listo
    volumes:
      - .:/app                       # Hot-reload en desarrollo (opcional)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
    name: eq4_mysql_data
